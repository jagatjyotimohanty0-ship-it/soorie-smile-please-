<!DOCTYPE html>
<html>

<head>

<title>Good Morning Baby ❤️</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}


body{

min-height:100vh;
display:flex;
justify-content:center;
align-items:center;

background:linear-gradient(135deg,#ff9ecf,#9fdcff);

}


.container{

width:90%;
max-width:420px;

padding:30px;

text-align:center;

background:rgba(255,255,255,0.3);

border-radius:25px;

backdrop-filter:blur(10px);

}


h1{

color:#ff2f92;
margin-bottom:20px;

}


p,h3{

margin:12px;

color:#444;

}



button{

padding:14px 25px;

border:none;

border-radius:30px;

background:#ff4fa3;

color:white;

font-size:16px;

cursor:pointer;

margin-top:15px;

box-shadow:0 5px 15px rgba(255,79,163,0.4);

transition:0.3s;

}


button:hover{

transform:scale(1.05);

}

#scanBox{

margin-top:25px;

font-size:18px;

color:#ff2f92;

}
.report-card{

background:rgba(255,255,255,0.45);

padding:20px;

border-radius:20px;

box-shadow:0 8px 25px rgba(0,0,0,0.15);

animation:cardShow 1s ease;

}



@keyframes cardShow{

from{

opacity:0;

transform:scale(0.8);

}


to{

opacity:1;

transform:scale(1);

}

}

/* Floating Hearts */

body::before{

content:"❤️ 💖 💕 💗 ❤️";

position:fixed;

top:0;
left:0;

width:100%;
height:100%;

font-size:30px;

word-spacing:50px;

line-height:100px;

opacity:0.25;

animation:hearts 10s linear infinite;

pointer-events:none;

}



@keyframes hearts{

0%{

transform:translateY(100vh);

}


100%{

transform:translateY(-120vh);

}

}


/* Button Glow Animation */

button{

animation:glow 2s infinite;

}



@keyframes glow{

0%{

box-shadow:0 0 5px #ff4fa3;

}


50%{

box-shadow:0 0 25px #ff4fa3;

}


100%{

box-shadow:0 0 5px #ff4fa3;

}

}



/* Scan Text Animation */

#scanBox{

animation:pulse 1s infinite;

}


@keyframes pulse{

50%{

transform:scale(1.03);

}

}
</style>

</head>


<body>


<div class="container">
<audio id="bgMusic" loop>

function startScan(){


let box=document.getElementById("scanBox");


let steps=[

"🤖 Scanner Loading...",

"█░░░░░░░░░ 10%<br>Tumhari profile search ho rahi hai... 👀",

"███████░░░ 70%<br>Heart connection verify ho raha hai... ❤️",

"██████████ 100%<br>Scan Complete! ✅"

];

let i=0;


let timer=setInterval(()=>{


box.innerHTML=steps[i];

i++;


if(i==steps.length){

clearInterval(timer);

setTimeout(showReport,1500);

}


},1500);



}
